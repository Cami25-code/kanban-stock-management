services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:80"
    depends_on:
      - db
    environment:
      APP_NAME: "Kanban Stock"
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-kanban_stock}
      DB_USERNAME: ${DB_USERNAME:-kanban_user}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - backend_storage:/var/www/html/storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-kanban_stock}
      MYSQL_USER: ${DB_USERNAME:-kanban_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  backend_storage:
  db_data:
